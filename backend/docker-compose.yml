version: "3.8"

services:
  mariadb:
    image: mariadb:latest
    container_name: smart-mariadb
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql # 추가
    restart: unless-stopped

volumes:
  mariadb_data:
